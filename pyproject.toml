# ---------------------------------------------------------------------------
# Project metadata and tool configuration (PEP 621 + per-tool [tool.*] tables).
# This file is the single config home for the project's dependencies, test
# runner, linter/formatter, and type checkers. uv manages the environment
# (see docs/ONBOARDING.md); requirements*.txt are generated from this for pip
# users (`uv export`).
# ---------------------------------------------------------------------------
[project]
name = "overengineered-todo"
version = "1.3.0"
description = "A deliberately over-engineered local Django TODO app: hexagonal architecture, domain events, transactional Unit of Work + Event Store, state machine, REST API + web UI."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Justin Kindrix" }]
dependencies = [
    "Django==5.2.16",
    "djangorestframework==3.16.1",
    "django-filter==25.2",
    "python-dotenv==1.2.2",  # >=1.2.2 fixes CVE-2026-28684
]

# PEP 735 dependency group for development/test/tooling.
[dependency-groups]
dev = [
    "pytest==9.0.3",  # >=9.0.3 fixes PYSEC-2026-1845
    "pytest-django>=4.9,<5",
    "pytest-cov>=5.0",
    "import-linter>=2.0,<3.0",
    "hypothesis>=6.100,<7.0",
    "ruff>=0.6,<1.0",
    "mypy>=1.11,<2.0",
    "django-stubs[compatible-mypy]>=5.1",
    "djangorestframework-stubs[compatible-mypy]>=3.15",
    "pyright>=1.1.380",
    "pre-commit>=3.7",
    # Security scanning.
    "bandit>=1.7",
    "pip-audit>=2.7",
    # Automated versioning + changelog + GitHub releases.
    "python-semantic-release>=9.8",
    # Docs site.
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.26",
]

# This is an application, not a distributable library: uv manages the venv but
# does not build/install the project itself.
[tool.uv]
package = false

# ---------------------------------------------------------------------------
# pytest (migrated from pytest.ini)
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = "test_*.py"
testpaths = ["tests"]
addopts = "-ra"

[tool.coverage.run]
source = ["tasks", "config"]
omit = ["*/migrations/*", "*/tests/*"]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = true
# Gate: fail if total coverage drops below this. Current: ~84% (with branch).
fail_under = 80

# ---------------------------------------------------------------------------
# Ruff (linter + formatter)
# ---------------------------------------------------------------------------
[tool.ruff]
line-length = 88
target-version = "py311"
extend-exclude = ["**/migrations/**"]

[tool.ruff.lint]
select = [
    "E", "F", "W",   # pyflakes / pycodestyle
    "I",              # isort
    "UP",             # pyupgrade
    "B",              # flake8-bugbear
    "C4",             # comprehensions
    "DJ",             # flake8-django
    "SIM",            # flake8-simplify
]
ignore = [
    "B904",  # raise ... from — stylistic; we use `from exc` where it matters
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B018"]
# The single-file demo intentionally keeps imports after settings.configure and
# uses long inline-HTML strings; both are the point of the "one file" contrast.
"examples/**" = ["E402", "E501"]

# ---------------------------------------------------------------------------
# Mypy — strict on the framework-free core (domain + application); the
# Django-heavy adapters are checked, but strictness there is a later step.
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.11"
warn_unused_ignores = true
warn_redundant_casts = true
exclude = ['migrations/']

[[tool.mypy.overrides]]
module = ["tasks.domain.*", "tasks.application.*"]
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_return_any = true
no_implicit_optional = true
strict_equality = true

# ---------------------------------------------------------------------------
# Pyright — point it at the uv-managed virtualenv so imports resolve.
# ---------------------------------------------------------------------------
[tool.pyright]
venvPath = "."
venv = ".venv"
pythonVersion = "3.11"
include = ["tasks", "config", "tests"]
exclude = ["**/migrations/**", "**/__pycache__/**", ".venv/**"]
typeCheckingMode = "basic"

# ---------------------------------------------------------------------------
# Bandit (security linter). Scans the application code; tests/migrations excluded.
# ---------------------------------------------------------------------------
[tool.bandit]
exclude_dirs = ["tests", "*/migrations/*", ".venv"]

# ---------------------------------------------------------------------------
# python-semantic-release — version bump + CHANGELOG + GitHub release, driven
# by conventional commits. Runs in CI (.github/workflows/release.yml).
# ---------------------------------------------------------------------------
[tool.semantic_release]
version_toml = ["pyproject.toml:project.version"]
build_command = ""
commit_message = "chore(release): v{version} [skip ci]"
tag_format = "v{version}"

[tool.semantic_release.branches.main]
match = "main"
