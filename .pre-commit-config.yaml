# Pre-commit hooks. Install once with `pre-commit install`; run on all files
# with `pre-commit run --all-files`. Mirrors the checks CI enforces.
#
# NOTE: the `local` hooks below (import-linter, mypy) run in your active
# environment, so activate the project venv (or `uv sync`) before committing —
# otherwise they report "executable not found". The ruff and basic hooks are
# self-contained and always work.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Enforce Conventional Commits on the commit message. Requires installing the
  # commit-msg hook: `pre-commit install --hook-type commit-msg`.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # Local hooks use the project's own environment so they see its dependencies.
  - repo: local
    hooks:
      - id: import-linter
        name: import-linter (architecture contracts)
        entry: lint-imports
        language: system
        pass_filenames: false
        types: [python]
      - id: mypy-core
        name: mypy (strict core)
        entry: mypy tasks/domain tasks/application
        language: system
        pass_filenames: false
        types: [python]
