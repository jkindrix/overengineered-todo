name: Release

on:
  push:
    branches: [main]

# Only one release at a time.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    # Skip the release commit's own push (it carries [skip ci]).
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install python-semantic-release
        run: pip install python-semantic-release

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version, changelog, tag, and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # `version` bumps pyproject, writes CHANGELOG, commits, tags, pushes,
        # and creates the GitHub release. No build artifacts, so no `publish`.
        run: semantic-release version
