name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # A throwaway key so the deploy check can run; never a real secret.
  DJANGO_SECRET_KEY: ci-only-not-a-real-secret-key-please-rotate-000000

jobs:
  quality:
    name: Quality (lint, types, security, checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .
      - name: Type check (mypy, strict core)
        run: mypy tasks/domain tasks/application
      - name: Architecture contracts (import-linter)
        run: lint-imports
      - name: Security lint (bandit)
        run: bandit -c pyproject.toml -r tasks config -q
      - name: Dependency audit (pip-audit)
        run: pip-audit
      - name: System check
        run: python manage.py check
      - name: Migrations up to date
        run: python manage.py makemigrations --check --dry-run
      - name: Deploy security check (production posture)
        run: DJANGO_DEBUG=False DJANGO_ALLOWED_HOSTS=example.com python manage.py check --deploy --fail-level WARNING

  test:
    name: Tests (py${{ matrix.python }} / Django ${{ matrix.django }})
    runs-on: ubuntu-latest
    needs: quality
    # The Django 6.0 cell is forward-compat signal only — non-blocking.
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
        django: ["==5.2.16"]
        include:
          - python: "3.13"
            django: ">=6.0,<7"
            experimental: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install "Django${{ matrix.django }}"
      - name: Tests + coverage gate
        run: pytest -q --cov --cov-report=xml
      - name: Upload coverage to Codecov
        if: ${{ matrix.python == '3.11' && matrix.django == '==5.2.16' }}
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          fail_ci_if_error: false
