name: Bug report
description: Something doesn't work as expected.
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting! Please fill in the details below."
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, plus what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. see error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag or commit SHA.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, how you ran it (venv / uv / Docker).
    validations:
      required: false
