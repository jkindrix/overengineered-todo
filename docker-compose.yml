# Local containerized run: `docker compose up --build`, then open
# http://localhost:8000. Uses SQLite inside the container (the project's default).
services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
    # Uncomment to live-mount your working tree for auto-reload during dev:
    # volumes:
    #   - ./:/app
